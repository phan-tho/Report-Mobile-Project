# CodeQL — static security scan cho code Kotlin/Java (Android).
# build-mode manual: tự build (compileDebugKotlin) giữa init và analyze vì autobuild
# hay vỡ với AGP.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Quét định kỳ hằng tuần (thứ Hai 05:23 UTC) để bắt advisory mới trên code cũ.
    - cron: '23 5 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  # Chỉ hủy run cũ trên PR; giữ run đầy đủ cho mỗi commit push main.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          git diff --name-only "$BASE" HEAD | tee /tmp/changed.txt

          # CodeQL java-kotlin scan chỉ cần chạy khi có thay đổi liên quan Kotlin/Java code/config
          if grep -Eq '^(app/|gradle/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradlew$|\.github/workflows/codeql\.yml$)' /tmp/changed.txt; then
            echo "android=true" >> "$GITHUB_OUTPUT"
          else
            echo "android=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze (java-kotlin)
    needs: changes
    if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      # clean + no-build-cache + no-daemon: ép compile THẬT trong step này.
      # Task FROM-CACHE/UP-TO-DATE hoặc daemon có sẵn ngoài tracer → CodeQL không
      # thấy compiler chạy → fail "no source code seen during the build".
      - name: Build for analysis
        run: ./gradlew --no-daemon --no-build-cache --no-configuration-cache clean :app:compileDebugKotlin --console=plain

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:java-kotlin"
