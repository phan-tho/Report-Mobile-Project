# CI tối ưu — tránh chạy Gradle/emulator cho docs-only PR, gộp các Gradle task
# để giảm thời gian configuration, và đưa JVM coverage vào cùng job unit test.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      android: ${{ steps.filter.outputs.android }}
      emulator: ${{ steps.filter.outputs.emulator }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          git diff --name-only "$BASE" HEAD | tee /tmp/changed.txt

          # Những file này có thể ảnh hưởng compile/test/lint Android.
          if grep -Eq '^(app/|gradle/|scripts/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradlew$|\.github/workflows/ci\.yml$|\.github/workflows/coverage\.yml$)' /tmp/changed.txt; then
            echo "android=true" >> "$GITHUB_OUTPUT"
          else
            echo "android=false" >> "$GITHUB_OUTPUT"
          fi

          # Emulator chỉ cần cho thay đổi runtime/instrumented-test hoặc khi sửa CI/build.
          if grep -Eq '^(app/src/main/|app/src/androidTest/|app/build\.gradle\.kts$|build\.gradle\.kts$|settings\.gradle\.kts$|gradle/|gradle\.properties$|\.github/workflows/ci\.yml$)' /tmp/changed.txt; then
            echo "emulator=true" >> "$GITHUB_OUTPUT"
          else
            echo "emulator=false" >> "$GITHUB_OUTPUT"
          fi

          # Screenshot verify chỉ cần khi thay đổi UI, theme, hoặc golden images.
          if grep -Eq '^app/src/(main/java/.*/ui/|main/res/|test/screenshots/)' /tmp/changed.txt; then
            echo "ui=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui=false" >> "$GITHUB_OUTPUT"
          fi

  wrapper-validation:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: gradle/actions/wrapper-validation@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

  static-analysis:
    needs: [changes, wrapper-validation]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # security-events: write để upload SARIF của Android Lint vào Code Scanning.
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Gate Room migration
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          sh scripts/check-room-migration.sh "origin/$GITHUB_BASE_REF" "HEAD"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Fast static checks (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew lintDebug detekt ktlintCheck --console=plain

      - name: Full static checks (main)
        if: github.event_name != 'pull_request'
        run: ./gradlew lintDebug lintRelease detekt ktlintCheck --console=plain

      # Đẩy kết quả Android Lint vào GitHub Code Scanning → warning hiện inline
      # trong tab Security và annotation trên PR (sarifReport bật trong build.gradle.kts).
      - name: Upload Lint SARIF lên Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif
          category: android-lint
        continue-on-error: true

  build-test:
    needs: [changes, wrapper-validation]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      checks: write
      # pull-requests: write để comment danh sách screenshot lệch khi verify fail.
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Unit test + coverage + APK builds
        env:
          RUN_SCREENSHOTS: ${{ needs.changes.outputs.ui }}
        run: |
          TEST_TASK=":app:testDebugUnitTest"
          if [ "$RUN_SCREENSHOTS" = "true" ]; then
            TEST_TASK=":app:verifyRoborazziDebug"
          fi
          ./gradlew \
            $TEST_TASK \
            :app:jacocoCoverageVerification \
            :app:jacocoTestReport \
            :app:assembleDebug \
            :app:assembleRelease \
            --console=plain

      - name: Upload Roborazzi report
        if: failure() && needs.changes.outputs.ui == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: roborazzi-report
          path: |
            app/build/reports/roborazzi/
            app/build/outputs/roborazzi/
          if-no-files-found: ignore

      - name: Comment screenshot diff lên PR
        if: failure() && github.event_name == 'pull_request' && needs.changes.outputs.ui == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFFS=$(find app/build/outputs/roborazzi -name '*_compare.png' 2>/dev/null | sed 's|.*/||; s|_compare\.png$||')
          [ -z "$DIFFS" ] && exit 0
          {
            echo "<!-- roborazzi-diff -->"
            echo "## Screenshot verify FAILED"
            echo ""
            echo "Golden bị lệch:"
            echo "$DIFFS" | sed 's/^/- `/; s/$/`/'
            echo ""
            echo "Ảnh diff: tải artifact **roborazzi-report** tại ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "UI đổi có chủ đích? → gắn label \`record-screenshots\` vào PR để re-record goldens."
          } > /tmp/roborazzi-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body-file /tmp/roborazzi-comment.md
        continue-on-error: true

      - name: Hiển thị JVM coverage thực tế từ XML
        if: always()
        run: |
          XML=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if [ ! -f "$XML" ]; then
            echo "Không có JaCoCo XML, bỏ qua summary."
            exit 0
          fi
          LINE=$(grep -o 'type="LINE" missed="[0-9]*" covered="[0-9]*"' "$XML" | tail -1)
          MISSED=$(echo "$LINE" | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*')
          COVERED=$(echo "$LINE" | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*')
          TOTAL=$((MISSED + COVERED))
          PCT=$(awk "BEGIN{printf \"%.2f\", $COVERED*100/$TOTAL}")
          echo "## JVM Coverage thực tế (LINE counter)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Overall LINE** | **${PCT}%** (${COVERED}/${TOTAL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Missed lines | ${MISSED} |" >> "$GITHUB_STEP_SUMMARY"

      - name: JVM overall coverage ≥ 85% (early check)
        id: coverage-report
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85
          title: JVM Coverage (early check)
          update-comment: true

      - name: Fail nếu overall JVM coverage tụt dưới 85%
        if: ${{ github.event_name == 'pull_request' && steps.coverage-report.outputs.coverage-overall < 85.0 }}
        run: |
          echo "JVM coverage tổng: ${{ steps.coverage-report.outputs.coverage-overall }}% (ngưỡng 85%)"
          exit 1

      - name: APK size report
        if: always()
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1 || true)
          if [ -z "$APK" ]; then
            echo "Không tìm thấy debug APK, bỏ qua size report."
            exit 0
          fi
          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "## APK Size" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`$(basename "$APK")\` | ${SIZE_MB} MB (${SIZE_BYTES} bytes) |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "::warning::APK size ${SIZE_MB} MB vượt ngưỡng 50 MB"
          fi

      # jacocoCoverageVerification đã chạy trong Gradle invocation ở trên — không gọi lại.

      - name: Upload unit test exec
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-exec
          path: app/build/jacoco/testDebugUnitTest.exec
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Upload JaCoCo XML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jvm-coverage-xml
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Submit dependency graph
        if: github.event_name == 'push'
        uses: gradle/actions/dependency-submission@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
        continue-on-error: true

  emulator-test:
    needs: [changes, build-test]
    if: ${{ needs.changes.outputs.android == 'true' && (github.event_name == 'push' || needs.changes.outputs.emulator == 'true' || contains(github.event.pull_request.labels.*.name, 'run-emulator')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6
        with:
          # Mã hóa để cache được configuration-cache giữa các run (chứa dữ liệu nhạy
          # cảm nên setup-gradle yêu cầu key). Secret chưa tồn tại → input rỗng, action bỏ qua.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Giải phóng disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-2* \
                      /usr/local/lib/android/sdk/platforms/android-3[0-2] \
                      /usr/local/lib/android/sdk/build-tools/3[0-2]* \
                      /usr/share/dotnet /usr/local/share/powershell \
                      /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache AVD + boot snapshot: lần đầu tạo AVD và boot đầy đủ để chụp snapshot,
      # các run sau emulator khởi động từ snapshot — cắt đáng kể thời gian boot.
      - name: AVD cache
        id: avd-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (Node 24)
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6-v1

      - name: Tạo AVD và chụp boot snapshot (chỉ khi cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot đã tạo để cache."

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          # force-avd-creation: false + -no-snapshot-save → tái dùng AVD/snapshot từ cache,
          # không ghi đè snapshot sau khi test (giữ snapshot sạch).
          force-avd-creation: false
          # Tắt animation hệ thống: giảm flakiness do transition chưa xong khi assert.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --console=plain

      - name: Download unit exec từ build-test
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (Node 24)
        with:
          name: unit-exec
          path: app/build/jacoco/

      - name: Tạo combined coverage report
        run: ./gradlew :app:jacocoCombinedReport --console=plain

      - name: Gate combined coverage (code mới ≥ 85%, overall ≥ 85%)
        id: combined-coverage
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-changed-files: 85
          min-coverage-overall: 85
          title: Combined Coverage (unit + emulator)
          update-comment: true

      - name: Gate combined overall (push main)
        id: combined-overall
        if: github.event_name != 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoCombinedReport/jacocoCombinedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85
          title: Combined Coverage (unit + emulator)
          update-comment: false

      - name: Fail nếu combined coverage vi phạm ngưỡng
        if: >
          ${{ (github.event_name == 'pull_request' &&
               (steps.combined-coverage.outputs.coverage-changed-files < 85.0 ||
                steps.combined-coverage.outputs.coverage-overall < 85.0)) ||
              (github.event_name != 'pull_request' &&
               steps.combined-overall.outputs.coverage-overall < 85.0) }}
        run: |
          echo "Combined coverage code mới: ${{ steps.combined-coverage.outputs.coverage-changed-files }}% (ngưỡng 85%)"
          echo "Combined coverage tổng: ${{ steps.combined-coverage.outputs.coverage-overall }}% (ngưỡng 85%)"
          exit 1

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: combined-coverage-report
          path: app/build/reports/jacoco/jacocoCombinedReport/
          if-no-files-found: ignore

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: emulator-test-report
          path: app/build/reports/androidTests/
          if-no-files-found: ignore
