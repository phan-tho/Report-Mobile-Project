# Record golden images cho screenshot test (Roborazzi) trên Linux runner —
# môi trường KHỚP với job verify trong ci.yml. Dev KHÔNG record trên máy local
# (Windows/macOS render font khác Linux → ảnh lệch).
#
# Cách dùng khi UI đổi có chủ đích:
#   - PR: gắn label `record-screenshots` vào PR (gỡ rồi gắn lại nếu cần chạy lần nữa).
#   - Sau khi merge vào main: Actions → Roborazzi record → Run workflow (chọn branch).
# Workflow commit goldens mới vào branch → CI verify chạy lại trên commit đó.
name: Roborazzi record

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: write

concurrency:
  group: roborazzi-record-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

jobs:
  record:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'record-screenshots'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Label event checkout về merge ref mặc định — cần head branch thật để push goldens.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Record golden images
        run: ./gradlew recordRoborazziDebug --console=plain

      - name: Commit goldens nếu có thay đổi
        run: |
          if [ -n "$(git status --porcelain app/src/test/screenshots)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/src/test/screenshots
            git commit -m "test(screenshot): cập nhật golden images (roborazzi-record)"
            git push
          else
            echo "Không có golden image nào thay đổi."
          fi
