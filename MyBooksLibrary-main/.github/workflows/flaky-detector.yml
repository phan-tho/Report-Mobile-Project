# Nightly flaky-detector: chạy full unit suite 3 lần liên tiếp trên cùng runner.
# Test nào lúc đỏ lúc xanh giữa các vòng = flaky → tự mở issue (kèm tên test)
# thay vì để nó chặn ngẫu nhiên PR của team (như PageDownloaderTest, issue #92).
# Test đỏ cả 3 vòng = main đang hỏng thật → cũng mở issue nhưng ghi rõ "hỏng ổn định".
name: Flaky detector

on:
  schedule:
    # 19:00 UTC = 02:00 giờ VN — ngoài giờ làm việc
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo '{"project_info":{"project_number":"123456789","project_id":"mock-project-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456789","android_client_info":{"package_name":"com.example.mybookslibrary"}},"oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"mock-api-key"}],"services":{"appinvite_service":{"status":1,"other_platform_oauth_client":[{"client_id":"123456789-test.apps.googleusercontent.com","client_type":3}]}}}]}' > app/google-services.json
          fi

      - name: Chạy unit suite 3 vòng
        id: rounds
        run: |
          mkdir -p /tmp/flaky
          for round in 1 2 3; do
            echo "=== Vòng $round ==="
            set +e
            ./gradlew :app:testDebugUnitTest --rerun-tasks --console=plain -q
            code=$?
            set -e
            # Gom tên test fail của vòng này (classname.testname) từ JUnit XML
            grep -rlE '<(failure|error)' app/build/test-results/testDebugUnitTest/*.xml 2>/dev/null \
              | xargs -r grep -hoE '<testcase name="[^"]+" classname="[^"]+"' \
              | sed -E 's/<testcase name="([^"]+)" classname="([^"]+)"/\2.\1/' \
              | sort -u > "/tmp/flaky/round$round.txt" || true
            echo "Vòng $round: exit=$code, fail=$(wc -l < /tmp/flaky/round$round.txt)"
          done

      - name: Phân loại flaky vs hỏng ổn định
        id: classify
        run: |
          cat /tmp/flaky/round*.txt | sort | uniq -c | sort -rn > /tmp/flaky/summary.txt
          # fail 1-2/3 vòng = flaky; fail 3/3 = hỏng ổn định
          awk '$1 < 3 { $1=""; print }' /tmp/flaky/summary.txt | sed 's/^ //' > /tmp/flaky/flaky.txt
          awk '$1 == 3 { $1=""; print }' /tmp/flaky/summary.txt | sed 's/^ //' > /tmp/flaky/broken.txt
          echo "flaky_count=$(wc -l < /tmp/flaky/flaky.txt)" >> "$GITHUB_OUTPUT"
          echo "broken_count=$(wc -l < /tmp/flaky/broken.txt)" >> "$GITHUB_OUTPUT"
          cat /tmp/flaky/summary.txt

      - name: Mở issue nếu phát hiện vấn đề
        if: steps.classify.outputs.flaky_count != '0' || steps.classify.outputs.broken_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="flaky-detector: phát hiện test không ổn định trên main"
          BODY="/tmp/flaky/issue-body.md"
          {
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            if [ -s /tmp/flaky/flaky.txt ]; then
              echo "## Flaky (fail 1-2/3 vòng — race condition hoặc test phụ thuộc thứ tự)"
              sed 's/^/- /' /tmp/flaky/flaky.txt
              echo ""
            fi
            if [ -s /tmp/flaky/broken.txt ]; then
              echo "## Hỏng ổn định (fail 3/3 vòng — main đang đỏ thật)"
              sed 's/^/- /' /tmp/flaky/broken.txt
              echo ""
            fi
            echo "Quy trình xử lý flaky: reproduce trước (stress run/giới hạn CPU), tìm root cause, fix tận gốc — không tăng timeout/retry để che. Tham khảo cách xử lý issue #92 (PR #97)."
          } > "$BODY"

          # Không mở trùng: nếu đã có issue mở cùng tiêu đề → comment thêm vào đó
          EXISTING=$(gh issue list --state open --search "in:title flaky-detector" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file "$BODY"
          else
            gh issue create --title "$TITLE" --body-file "$BODY" --label "flaky"
          fi
